<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaybolan Kültürel Miraslar Haritası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 20px; }
        .filter-container { background: #ecf0f1; padding: 10px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select { padding: 5px; font-size: 14px; border-radius: 4px; }
        #map { height: calc(100vh - 110px); width: 100%; }
        .popup-content img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 5px; margin-top: 5px; }
        .popup-content h3 { margin: 0 0 5px 0; color: #2980b9; }
        .popup-content p { margin: 0; font-size: 13px; color: #333; }
    </style>
</head>
<body>

    <header>
        <h1>İstanbul'un Kaybolan Kültürel Mirasları</h1>
    </header>

    <div class="filter-container">
        <label for="categoryFilter"><b>Miras Türü Filtrele: </b></label>
        <select id="categoryFilter">
            <option value="Tümü">Tümü (Tümünü Göster)</option>
            <option value="Sarnıç">Sarnıç</option>
            <option value="Mahzen/Tünel">Mahzen / Tünel</option>
            <option value="Kayıp Yapı">Kayıp Yapı</option>
        </select>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Haritayı başlat
        const map = L.map('map').setView([41.0150, 28.9650], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        let allMarkers = [];

        const kategoriler = ["Sarnıç", "Mahzen/Tünel", "Kayıp Yapı"];
        const gorseller = [
            "https://images.unsplash.com/photo-1590075865003-e48277faa558?w=500",
            "https://images.unsplash.com/photo-1542332213-9b5a5a3fda35?w=500",
            "https://images.unsplash.com/photo-1563911302283-d2bc129e7570?w=500"
        ];

        const isimEkleri = [
            "Yerebatan", "Binbirdirek", "Theodosius", "Zeyrek", "Pantokrator", "Sultan", "Hagia Sophia", "Topkapı", "Vefa", "Fatih",
            "Galata", "Ceneviz", "Anemas", "Yedikule", "Mese", "Bukoleon", "Blachernae", "Kariye", "Tophane", "Beşiktaş",
            "Üsküdar", "Kadıköy", "Balat", "Fener", "Eminönü", "Sirkeci", "Beyazıt", "Laleli", "Aksaray", "Yenikapı",
            "Kumkapı", "Samatya", "Hasköy", "Kasımpaşa", "Karaköy", "Mangana", "Chalke", "Lausus", "Philadelphion", "Studios"
        ];

        // DÖNGÜ İLE 100 TANE TAMAMEN BENZERSİZ KOORDİNAT VE NOKTA ÜRETİMİ
        for(let i = 1; i <= 100; i++) {
            const katIndex = i % 3;
            const kategori = kategoriler[katIndex];
            const gorsel = gorseller[katIndex];
            const isimEk = isimEkleri[i % isimEkleri.length];
            
            // Matematiksel spiral formülü kullanarak koordinatların üst üste binmesini KESİNLİKLE engelliyoruz
            const angle = 0.1 * i;
            const lat = 41.0120 + (0.0005 * i * Math.sin(angle)) + (Math.sin(i) * 0.002);
            const lng = 28.9600 + (0.0008 * i * Math.cos(angle)) + (Math.cos(i) * 0.003);

            const ad = `Tarihi ${isimEk} ${kategori} Yerleşkesi (No: ${i})`;
            const aciklama = `İstanbul'un yeraltı envanterinde yer alan, Bizans ve Osmanlı dönemine ait ${kategori.toLowerCase()} yapısı. Kültürel miras projesi kapsamında ${i} numaralı alan olarak tescillenmiştir.`;
            
            const popupHtml = `
                <div class="popup-content">
                    <h3>${ad}</h3>
                    <p><strong>Tür:</strong> ${kategori}</p>
                    <p>${aciklama}</p>
                    <img src="${gorsel}" alt="${ad}">
                </div>
            `;

            const marker = L.marker([lat, lng]);
            marker.category = kategori;
            marker.bindPopup(popupHtml);
            marker.addTo(map);
            
            allMarkers.push(marker);
        }

        // Filtreleme Mantığı
        document.getElementById('categoryFilter').addEventListener('change', function(e) {
            const selectedCategory = e.target.value;
            allMarkers.forEach(marker => {
                map.removeLayer(marker);
                if (selectedCategory === "Tümü" || marker.category === selectedCategory) {
                    marker.addTo(map);
                }
            });
        });
    </script>
</body>
</html>
