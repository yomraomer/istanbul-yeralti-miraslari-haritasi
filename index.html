<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaybolan Kültürel Miraslar Haritası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 20px; }
        .filter-container { background: #ecf0f1; padding: 10px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select { padding: 5px; font-size: 14px; border-radius: 4px; }
        #map { height: calc(100vh - 110px); width: 100%; }
        .popup-content img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 5px; margin-top: 5px; }
        .popup-content h3 { margin: 0 0 5px 0; color: #2980b9; }
        .popup-content p { margin: 0; font-size: 13px; color: #333; }
    </style>
</head>
<body>

    <header>
        <h1>İstanbul'un Kaybolan Kültürel Mirasları</h1>
    </header>

    <div class="filter-container">
        <label for="categoryFilter"><b>Miras Türü Filtrele: </b></label>
        <select id="categoryFilter">
            <option value="Tümü">Tümü (Tümünü Göster)</option>
            <option value="Sarnıç">Sarnıç</option>
            <option value="Mahzen/Tünel">Mahzen / Tünel</option>
            <option value="Kayıp Yapı">Kayıp Yapı</option>
        </select>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const map = L.map('map').setView([41.0082, 28.9784], 12);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        let allMarkers = [];

        // 
        const sheetCSVUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQonihG9eBJWC8ybfN_wHEcnzU8Rgcs73LEG5mGmlGrIW5sPq_FbLODFF97W1XLmy-RxjwAB_Wx-pLz/pub?output=csv';

        Papa.parse(sheetCSVUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                
                data.forEach(row => {
                    if(row.Enlem && row.Boylam) {
                        const lat = parseFloat(row.Enlem.trim());
                        const lng = parseFloat(row.Boylam.trim());
                        
                        if(!isNaN(lat) && !isNaN(lng)) {
                            const popupHtml = `
                                <div class="popup-content">
                                    <h3>${row.Ad}</h3>
                                    <p><strong>Tür:</strong> ${row.Kategori}</p>
                                    <p>${row.Aciklama}</p>
                                    ${row.GorselURL ? `<img src="${row.GorselURL}" alt="${row.Ad}">` : ''}
                                </div>
                            `;

                            const marker = L.marker([lat, lng]);
                            marker.category = row.Kategori;
                            marker.bindPopup(popupHtml);
                            marker.addTo(map);
                            
                            allMarkers.push(marker);
                        }
                    }
                });
            }
        });

        document.getElementById('categoryFilter').addEventListener('change', function(e) {
            const selectedCategory = e.target.value;
            allMarkers.forEach(marker => {
                map.removeLayer(marker);
                if (selectedCategory === "Tümü" || marker.category === selectedCategory) {
                    marker.addTo(map);
                }
            });
        });
    </script>
</body>
</html>
